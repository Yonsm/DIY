<!DOCTYPE html>
<html>
<head>
  <title>Yi hack</title>
</head>
<body>
  <h1>Yi HTTP Server</h1>
  <p>This Yi is powered by a custom firmware. See <a href="https://github.com/Yonsm/YiHack">https://github.com/Yonsm/YiHack</a> for more informations</a>.</p>

  <h2>Record Files</h2>
  <ul>
    <li><a href="/record/">Record videos</a></li>
    <li><a href="/lastest">Lastest video</a></li>
  </ul>

  <h2>RTSP Streams</h2>
  <p>This camera IP is <span id="ip"></span></p>
  <ul>
    <li><a id="ch0_0" href="">Video stream - HD</a></li>
    <li><a id="ch0_1" href="">Video stream - SD</a></li>
    <li><a id="ch0_3" href="">Audio stream</a></li>
  </ul>

<script type="text/javascript">
      var ip = location.host;
      document.getElementById("ip").textContent=ip;
      document.getElementById("ch0_0").href="rtsp://"+ip+"/ch0_0.h264";
      document.getElementById("ch0_1").href="rtsp://"+ip+"/ch0_1.h264";
      document.getElementById("ch0_3").href="rtsp://"+ip+"/ch0_3.h264";
  </script>
</body>
</html>
